syntax = "proto3";

package cline;

import "cline/common.proto";

option go_package = "github.com/cline/grpc-go/cline";
option java_multiple_files = true;
option java_package = "bot.cline.proto";

// Service for BMS AUTOSAR generation and compile/build integration with structured progress events.
service BmsAutosarService {
  // Starts a generation task and streams progress back to the client.
  rpc generateBmsAutosar(GenerateBmsAutosarRequest) returns (stream BmsAutosarProgressEvent);

  // Cancels the currently running BMS AUTOSAR generation task.
  rpc cancelBmsAutosarGeneration(EmptyRequest) returns (Empty);

  // Executes a BMS AUTOSAR compile/build profile in a terminal.
  rpc compileBmsAutosar(CompileBmsAutosarRequest) returns (CompileBmsAutosarResponse);

  // Lists available compile/build profiles (built-in + workspace/global).
  rpc listBmsAutosarCompileProfiles(ListBmsAutosarCompileProfilesRequest) returns (BmsAutosarCompileProfilesList);

  // Saves a user-defined compile/build profile.
  rpc saveBmsAutosarCompileProfile(SaveBmsAutosarCompileProfileRequest) returns (String);

  // Deletes a user-defined compile/build profile.
  rpc deleteBmsAutosarCompileProfile(DeleteBmsAutosarCompileProfileRequest) returns (String);
}

// Request to start a BMS AUTOSAR generation task.
message GenerateBmsAutosarRequest {
  Metadata metadata = 1;
  string component_type = 2;
  string component_name = 3;
  string output_format = 4;
  string requirements = 5;
  string ports_json = 6;
  string runnables_json = 7;
  // Fully-built prompt that will be sent to the task runtime.
  string prompt = 8;
  // ASIL level: QM, ASIL_A, ASIL_B, ASIL_C, ASIL_D.
  string asil_level = 9;
}

// Progress event emitted during BMS AUTOSAR generation.
message BmsAutosarProgressEvent {
  string stage = 1;
  string message = 2;
  int32 percent_complete = 3;
  bool is_complete = 4;
  string error = 5;
}

// Compile/build workflow type for BMS AUTOSAR.
// "appl"  : run the make-like command from the <workspace>/appl directory.
// "launch": run launch.bat in the workspace root, then run make.
message BmsAutosarCompileProfile {
  string id = 1;
  string name = 2;
  string workflow = 3;
  // Optional command override. When empty, the handler builds a default command.
  string command = 4;
  // Working directory relative to the workspace root (e.g. "appl" or empty).
  string working_dir_relative = 5;
  // Parallel job count passed to -j (default 32).
  int32 jobs = 6;
  // True for built-in profiles that cannot be deleted.
  bool is_builtin = 7;
  // Scope: "workspace", "global", or empty for built-in profiles.
  string scope = 8;
  // Optional ordered command list. When provided, each entry is executed sequentially.
  repeated string commands = 9;
}

message CompileBmsAutosarRequest {
  string profile_id = 1;
  // Scope used when resolving a built-in profile that has also been saved by the user.
  string scope = 2;
}

message CompileBmsAutosarResponse {
  bool success = 1;
  // The command that was sent to the terminal.
  string command = 2;
  string message = 3;
}

message ListBmsAutosarCompileProfilesRequest {
  string scope = 1;
}

message BmsAutosarCompileProfilesList {
  repeated BmsAutosarCompileProfile profiles = 1;
  string last_selected_id = 2;
}

message SaveBmsAutosarCompileProfileRequest {
  string scope = 1;
  BmsAutosarCompileProfile profile = 2;
}

message DeleteBmsAutosarCompileProfileRequest {
  string scope = 1;
  string id = 2;
}
