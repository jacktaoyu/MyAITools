syntax = "proto3";

package cline;

import "cline/common.proto";

option go_package = "github.com/cline/grpc-go/cline";
option java_multiple_files = true;
option java_package = "bot.cline.proto";

// Service for file-related operations
service FileService {
  // Copies text to clipboard
  rpc copyToClipboard(StringRequest) returns (Empty);

  // Opens a file in the editor
  rpc openFile(StringRequest) returns (Empty);

  // Opens an ARXML source file and jumps to a specific line.
  rpc openArxmlSource(OpenArxmlSourceRequest) returns (Empty);

  // Opens an image in the system viewer
  rpc openImage(StringRequest) returns (Empty);

  // Opens a mention (file, path, git commit, problem, terminal, or URL)
  rpc openMention(StringRequest) returns (Empty);

  // Deletes a rule file from either global or workspace rules directory
  rpc deleteRuleFile(RuleFileRequest) returns (RuleFile);

  // Creates a rule file from either global or workspace rules directory
  rpc createRuleFile(RuleFileRequest) returns (RuleFile);

  // Search git commits in the workspace
  rpc searchCommits(StringRequest) returns (GitCommits);

  // Select images and other files from the file system and returns as data URLs & paths respectively
  rpc selectFiles(BooleanRequest) returns (StringArrays);

  // Convert URIs to workspace-relative paths
  rpc getRelativePaths(RelativePathsRequest) returns (RelativePaths);

  // Search for files in the workspace with fuzzy matching
  rpc searchFiles(FileSearchRequest) returns (FileSearchResults);

  // Toggle a Cline rule (enable or disable)
  rpc toggleClineRule(ToggleClineRuleRequest) returns (ToggleClineRules);

  // Toggle a Cursor rule (enable or disable)
  rpc toggleCursorRule(ToggleCursorRuleRequest) returns (ClineRulesToggles);

  // Toggle a Windsurf rule (enable or disable)
  rpc toggleWindsurfRule(ToggleWindsurfRuleRequest) returns (ClineRulesToggles);

  // Toggle an Agents rule (enable or disable)
  rpc toggleAgentsRule(ToggleAgentsRuleRequest) returns (ClineRulesToggles);

  // Refreshes all rule toggles (Cline, External, and Workflows)
  rpc refreshRules(EmptyRequest) returns (RefreshedRules);

  // Opens a task's conversation history file on disk
  rpc openDiskConversationHistory(StringRequest) returns (Empty);

  // Toggles a workflow on or off
  rpc toggleWorkflow(ToggleWorkflowRequest) returns (ClineRulesToggles);

  // Check if file exists in the project
  rpc ifFileExistsRelativePath(StringRequest) returns (BooleanResponse);

  // Open a file in editor by a relative path
  rpc openFileRelativePath(StringRequest) returns (Empty);

  // Opens or creates a focus chain checklist markdown file for editing
  rpc openFocusChainFile(StringRequest) returns (Empty);

  // Refreshes all hook toggles (discovers hooks and their enabled state)
  rpc refreshHooks(EmptyRequest) returns (HooksToggles);

  // Toggles a hook on or off via chmod +x/-x
  rpc toggleHook(ToggleHookRequest) returns (ToggleHookResponse);

  // Creates a new hook from template
  rpc createHook(CreateHookRequest) returns (CreateHookResponse);

  // Deletes an existing hook file
  rpc deleteHook(DeleteHookRequest) returns (DeleteHookResponse);

  // Refreshes all skill toggles (discovers skills and their enabled state)
  rpc refreshSkills(EmptyRequest) returns (RefreshedSkills);

  // Toggles a skill on or off
  rpc toggleSkill(ToggleSkillRequest) returns (SkillsToggles);

  // Creates a new skill from template
  rpc createSkillFile(CreateSkillRequest) returns (SkillsToggles);

  // Deletes an existing skill directory
  rpc deleteSkillFile(DeleteSkillRequest) returns (SkillsToggles);

  // Opens a file picker to import an Excel/Word/PDF document into the BMS AUTOSAR knowledge base
  rpc addBmsKnowledge(AddBmsKnowledgeRequest) returns (String);

  // Opens a folder picker to recursively import all supported documents from a folder into the BMS AUTOSAR knowledge base
  rpc addBmsKnowledgeFolder(AddBmsKnowledgeFolderRequest) returns (String);

  // Lists BMS AUTOSAR knowledge entries for the current workspace or global scope
  rpc listBmsKnowledge(BmsKnowledgeListRequest) returns (BmsKnowledgeList);

  // Deletes a BMS AUTOSAR knowledge entry by topic
  rpc deleteBmsKnowledge(DeleteBmsKnowledgeRequest) returns (String);

  // Updates an existing BMS AUTOSAR knowledge entry
  rpc updateBmsKnowledge(UpdateBmsKnowledgeRequest) returns (String);

  // Performs a semantic + lexical search over the BMS AUTOSAR knowledge base.
  rpc searchBmsKnowledge(SearchBmsKnowledgeRequest) returns (BmsKnowledgeSearchResults);

  // Exports the BMS AUTOSAR knowledge base as a JSON string.
  rpc exportBmsKnowledge(BmsKnowledgeListRequest) returns (String);

  // Imports BMS AUTOSAR knowledge entries from a JSON string.
  rpc importBmsKnowledgeJson(ImportBmsKnowledgeJsonRequest) returns (String);

  // Returns the latest BMS AUTOSAR quality/MISRA report for the workspace.
  rpc getBmsAutosarQualityReport(BmsAutosarQualityReportRequest) returns (BmsAutosarQualityReport);

  // Builds an ARXML knowledge graph from the given ARXML file paths.
  rpc getBmsAutosarKnowledgeGraph(BmsAutosarKnowledgeGraphRequest) returns (BmsAutosarKnowledgeGraph);

  // Parses a CAN DBC file into external graph nodes.
  rpc parseBmsAutosarDbc(StringRequest) returns (BmsAutosarExternalGraph);

  // Parses an Excel interface/parameter file into external graph nodes.
  rpc parseBmsAutosarExcel(StringRequest) returns (BmsAutosarExternalGraph);

  // Parses Simulink data dictionary (.m) files into external graph nodes.
  rpc parseBmsAutosarSimulinkData(StringRequest) returns (BmsAutosarExternalGraph);

  // Automatically fixes BMS AUTOSAR generated code using the configured LLM
  // based on the latest quality/MISRA report. Set apply=true to write the fix
  // to disk; otherwise a preview diff is returned for user confirmation.
  rpc autoFixBmsAutosarFile(AutoFixBmsAutosarFileRequest) returns (AutoFixBmsAutosarFileResponse);

  // Automatically fixes multiple BMS AUTOSAR generated files in one call.
  // Set apply=true to write all fixes to disk; otherwise preview diffs are
  // returned for user confirmation.
  rpc autoFixBmsAutosarFiles(AutoFixBmsAutosarFilesRequest) returns (AutoFixBmsAutosarFilesResponse);

  // Lists built-in and user-defined BMS AUTOSAR generation templates.
  rpc listBmsAutosarTemplates(ListBmsAutosarTemplatesRequest) returns (BmsAutosarTemplatesList);

  // Saves a user-defined BMS AUTOSAR generation template.
  rpc saveBmsAutosarTemplate(SaveBmsAutosarTemplateRequest) returns (String);

  // Deletes a user-defined BMS AUTOSAR generation template.
  rpc deleteBmsAutosarTemplate(DeleteBmsAutosarTemplateRequest) returns (String);
}

// Response for refreshRules operation
message RefreshedRules {
  ClineRulesToggles global_cline_rules_toggles = 1;
  ClineRulesToggles local_cline_rules_toggles = 2;
  ClineRulesToggles local_cursor_rules_toggles = 3;
  ClineRulesToggles local_windsurf_rules_toggles = 4;
  ClineRulesToggles local_agents_rules_toggles = 5;
  ClineRulesToggles local_workflow_toggles = 6;
  ClineRulesToggles global_workflow_toggles = 7;
}

// Request to toggle a Windsurf rule
message ToggleWindsurfRuleRequest {
  Metadata metadata = 1;
  string rule_path = 2; // Path to the rule file
  bool enabled = 3; // Whether to enable or disable the rule
}

// Request to toggle an Agents rule
message ToggleAgentsRuleRequest {
  Metadata metadata = 1;
  string rule_path = 2; // Path to the rule file
  bool enabled = 3; // Whether to enable or disable the rule
}

// Request to convert a list of URIs to relative paths
message RelativePathsRequest {
  Metadata metadata = 1;
  repeated string uris = 2;
}

// Response containing the converted relative paths
message RelativePaths {
  repeated string paths = 1;
}

// Enum for file search type filtering
enum FileSearchType {
  FILE = 0;
  FOLDER = 1;
}

// Request for file search operations
message FileSearchRequest {
  Metadata metadata = 1;
  string query = 2; // Search query string
  optional string mentions_request_id = 3; // Optional request ID for tracking requests
  optional int32 limit = 4; // Optional limit for results (default: 20)
  optional FileSearchType selected_type = 5; // Optional selected type filter
  optional string workspace_hint = 6; // Optional workspace name to search in
}

// Result for file search operations
message FileSearchResults {
  repeated FileInfo results = 1; // Array of file/folder results
  optional string mentions_request_id = 2; // Echo of the request ID for tracking
  // Machine-readable reason for an empty result list. Unset on success.
  // Known values:
  //   "workspace_not_ready"   - host project model not yet loaded; retry-able.
  //   "workspace_unavailable" - no workspace path; configuration error.
  //   "ripgrep_spawn_failed"  - rg binary failed to spawn or exited non-zero.
  //   "results_truncated"     - result cap hit (reserved for Phase 2C).
  //   "unknown"               - catch-all; see error_message.
  optional string error_reason = 3;
  // Optional human-readable detail; rendered as a subtitle in the picker UI.
  optional string error_message = 4;
}

// File information structure for search results
message FileInfo {
  string path = 1; // Relative path from workspace root
  string type = 2; // "file" or "folder"
  optional string label = 3; // Display name (usually basename)
  optional string workspace_name = 4; // Workspace this result came from
}

// Response for searchCommits
message GitCommits {
  repeated GitCommit commits = 1;
}

// Represents a Git commit
message GitCommit {
  string hash = 1;
  string short_hash = 2;
  string subject = 3;
  string author = 4;
  string date = 5;
}

// Unified request for all rule file operations
message RuleFileRequest {
  Metadata metadata = 1;
  bool is_global = 2; // Common field for all operations
  optional string rule_path = 3; // Path field for deleteRuleFile (optional)
  optional string filename = 4; // Filename field for createRuleFile (optional)
  optional string type = 5; // Type of the file to create (optional)
}

// Result for rule file operations with meaningful data only
message RuleFile {
  string file_path = 1; // Path to the rule file
  string display_name = 2; // Filename for display purposes
  bool already_exists = 3; // For createRuleFile, indicates if file already existed
}

// Enum for rule scope (local, global, or remote)
enum RuleScope {
  LOCAL = 0;
  GLOBAL = 1;
  REMOTE = 2;
}

// Request to toggle a Cline rule
message ToggleClineRuleRequest {
  Metadata metadata = 1;
  RuleScope scope = 2; // Scope of the rule (local, global, or remote)
  string rule_path = 3; // Path to the rule file
  bool enabled = 4; // Whether to enable or disable the rule
}

// Maps from filepath to enabled/disabled status, matching app's ClineRulesToggles type
message ClineRulesToggles {
  map<string, bool> toggles = 1;
}

// Response for toggleClineRule operation
message ToggleClineRules {
  ClineRulesToggles global_cline_rules_toggles = 1;
  ClineRulesToggles local_cline_rules_toggles = 2;
  ClineRulesToggles remote_rules_toggles = 3;
}

// Request to toggle a Cursor rule
message ToggleCursorRuleRequest {
  Metadata metadata = 1;
  string rule_path = 2; // Path to the rule file
  bool enabled = 3; // Whether to enable or disable the rule
}

// Request to toggle a workflow on or off
message ToggleWorkflowRequest {
  Metadata metadata = 1;
  string workflow_path = 2;
  bool enabled = 3;
  RuleScope scope = 4; // Scope of the workflow (local, global, or remote)
}

// Maps from hook name to enabled/disabled status
message HookInfo {
  string name = 1;
  bool enabled = 2;
  string absolute_path = 3;
}

message WorkspaceHooks {
  string workspace_name = 1;
  repeated HookInfo hooks = 2;
}

message HooksToggles {
  repeated HookInfo global_hooks = 1;
  repeated WorkspaceHooks workspace_hooks = 2;
  bool is_windows = 3; // Whether the system is Windows (toggles disabled)
}

// Request to toggle a hook
message ToggleHookRequest {
  Metadata metadata = 1;
  string hook_name = 2; // Name of the hook (e.g., "TaskStart")
  bool is_global = 3; // Whether this is a global or workspace hook
  bool enabled = 4; // Whether to enable (chmod +x) or disable (chmod -x)
  optional string workspace_name = 5; // For multi-root workspaces, specifies which workspace
}

// Response for toggleHook operation
message ToggleHookResponse {
  HooksToggles hooks_toggles = 1;
}

// Request to create a hook
message CreateHookRequest {
  Metadata metadata = 1;
  string hook_name = 2; // Name of the hook to create
  bool is_global = 3; // Whether to create in global or workspace hooks directory
  optional string workspace_name = 4; // For multi-root workspaces, specifies which workspace
}

// Response for createHook operation
message CreateHookResponse {
  HooksToggles hooks_toggles = 1;
}

// Request to delete a hook
message DeleteHookRequest {
  Metadata metadata = 1;
  string hook_name = 2; // Name of the hook to delete
  bool is_global = 3; // Whether this is a global or workspace hook
  optional string workspace_name = 4; // For multi-root workspaces, specifies which workspace
}

// Response for deleteHook operation
message DeleteHookResponse {
  HooksToggles hooks_toggles = 1;
}

// Skill information structure
message SkillInfo {
  string name = 1; // Name of the skill (matches directory name)
  string description = 2; // Description from SKILL.md frontmatter
  string path = 3; // Full path to SKILL.md file (or "remote:<name>" for remote skills)
  bool enabled = 4; // Whether the skill is enabled
  bool always_enabled = 5; // Whether the skill is always enabled (remote only, user cannot toggle off)
}

// Response for refreshSkills operation
message RefreshedSkills {
  repeated SkillInfo global_skills = 1;
  repeated SkillInfo local_skills = 2;
}

// Maps from skill path to enabled/disabled status
message SkillsToggles {
  map<string, bool> global_skills_toggles = 1;
  map<string, bool> local_skills_toggles = 2;
  map<string, bool> remote_skills_toggles = 3;
}

// Request to toggle a skill
message ToggleSkillRequest {
  Metadata metadata = 1;
  string skill_path = 2; // Path to the skill directory
  bool is_global = 3; // Whether this is a global or workspace skill
  bool enabled = 4; // Whether to enable or disable the skill
}

// Request to create a skill
message CreateSkillRequest {
  Metadata metadata = 1;
  string skill_name = 2; // Name of the skill to create
  bool is_global = 3; // Whether to create in global or workspace skills directory
}

// Request to delete a skill
message DeleteSkillRequest {
  Metadata metadata = 1;
  string skill_path = 2; // Path to the skill directory
  bool is_global = 3; // Whether this is a global or workspace skill
}

// Source location metadata for a knowledge snippet (e.g. PDF page or DOCX chapter).
message BmsKnowledgeLocation {
  string path = 1; // Source file path
  int32 page = 2; // PDF page number (0 if unknown)
  string chapter = 3; // DOCX chapter/section heading (empty if unknown)
}

// A single BMS AUTOSAR knowledge entry summary
message BmsKnowledgeEntry {
  string topic = 1;
  string updated_at = 2;
  repeated string tags = 3;
  bool has_embedding = 4;
  bool embedding_stale = 5;
  string content = 6;
  repeated string source_files = 7; // Files that contributed to this entry (e.g. folder import sources)
  string source_path = 8; // Primary source file path for this entry
  string source_hash = 9; // SHA-256 of the source file content
  int64 source_mtime_ms = 10; // Source file mtime in milliseconds
  int64 source_size = 11; // Source file size in bytes
  repeated BmsKnowledgeLocation locations = 12; // Page/chapter locations (optional)
}

// Response containing all BMS AUTOSAR knowledge entries
message BmsKnowledgeList {
  repeated BmsKnowledgeEntry entries = 1;
}

// Request to list BMS AUTOSAR knowledge entries
message BmsKnowledgeListRequest {
  Metadata metadata = 1;
  string scope = 2; // "workspace" or "global"
}

// Request to add a file to the BMS AUTOSAR knowledge base
message AddBmsKnowledgeRequest {
  Metadata metadata = 1;
  string scope = 2; // "workspace" or "global"
}

// Request to add a folder to the BMS AUTOSAR knowledge base
message AddBmsKnowledgeFolderRequest {
  Metadata metadata = 1;
  string scope = 2; // "workspace" or "global"
}

// Request to delete a BMS AUTOSAR knowledge entry
message DeleteBmsKnowledgeRequest {
  Metadata metadata = 1;
  string topic = 2;
  string scope = 3; // "workspace" or "global"
}

// Request to update an existing BMS AUTOSAR knowledge entry
message UpdateBmsKnowledgeRequest {
  Metadata metadata = 1;
  string topic = 2;
  string content = 3;
  repeated string tags = 4;
  string scope = 5; // "workspace" or "global"
}

// Query intent for BMS AUTOSAR knowledge retrieval.
enum BmsAutosarKnowledgeIntent {
  UNKNOWN = 0;
  GENERAL = 1;
  COMPONENT_LOOKUP = 2;
  SAFETY_GUIDANCE = 3;
  INTERFACE_SEARCH = 4;
}

// Request to search the BMS AUTOSAR knowledge base.
message SearchBmsKnowledgeRequest {
  Metadata metadata = 1;
  string query = 2;
  string scope = 3; // "workspace" or "global"
  int32 top_k = 4;
  repeated string tags = 5;
  repeated string source_files = 6;
  double hybrid_weight = 7;
  double score_threshold = 8;
  bool use_reranker = 9;
  BmsAutosarKnowledgeIntent intent = 10;
}

// A single semantic/lexical search result.
message BmsKnowledgeSearchResult {
  string topic = 1;
  double score = 2;
  string source_path = 3;
  string snippet = 4;
  repeated string tags = 5;
  repeated string source_files = 6;
  repeated BmsKnowledgeLocation locations = 7;
}

// Response containing ranked BMS AUTOSAR knowledge search results.
message BmsKnowledgeSearchResults {
  repeated BmsKnowledgeSearchResult results = 1;
}

// Request to import BMS AUTOSAR knowledge entries from JSON.
message ImportBmsKnowledgeJsonRequest {
  Metadata metadata = 1;
  string scope = 2; // "workspace" or "global"
  string json = 3; // JSON string matching the knowledge.json format
}

// Request to retrieve the BMS AUTOSAR quality report for the current workspace.
message BmsAutosarQualityReportRequest {
  Metadata metadata = 1;
}

// A single issue in the BMS AUTOSAR quality report.
message BmsAutosarQualityIssue {
  string severity = 1; // "error", "warning", or "info"
  string message = 2;
  int32 line = 3;
  string rule = 4;
  string category = 5; // "MISRA", "ASIL", "STRUCTURAL", "COMPILE"
}

// A file entry in the BMS AUTOSAR quality report.
message BmsAutosarQualityReportFile {
  string file_path = 1;
  repeated BmsAutosarQualityIssue issues = 2;
}

// Response containing the BMS AUTOSAR quality report.
message BmsAutosarQualityReport {
  string cwd = 1;
  repeated BmsAutosarQualityReportFile files = 2;
  int32 errors = 3;
  int32 warnings = 4;
  int32 info = 5;
  int32 total = 6;
  string updated_at = 7;
}

// Request to retrieve the ARXML knowledge graph for a set of source files.
message BmsAutosarKnowledgeGraphRequest {
  Metadata metadata = 1;
  string scope = 2; // "workspace" or "global"
  repeated string file_paths = 3; // Optional absolute paths to ARXML files
}

// A node in the ARXML knowledge graph.
message BmsAutosarKnowledgeGraphNode {
  string id = 1;
  string type = 2;
  string name = 3;
  string path = 4;
  string package_path = 5;
  string source_file = 6;
  int32 line = 7;
}

// Request to open an ARXML source file at a specific line.
message OpenArxmlSourceRequest {
  Metadata metadata = 1;
  string file_path = 2;
  int32 line = 3;
}

// An edge in the ARXML knowledge graph.
message BmsAutosarKnowledgeGraphEdge {
  string source = 1;
  string target = 2;
  string relation = 3;
}

// Response containing the ARXML knowledge graph.
message BmsAutosarKnowledgeGraph {
  repeated BmsAutosarKnowledgeGraphNode nodes = 1;
  repeated BmsAutosarKnowledgeGraphEdge edges = 2;
}

// A node representing an external asset (DBC signal, Excel row, Simulink data type).
message BmsAutosarExternalNode {
  string id = 1;
  string type = 2;
  string name = 3;
  string source_file = 4;
  string metadata = 5;
}

// An edge connecting an external node to an ARXML node.
message BmsAutosarExternalEdge {
  string source = 1;
  string target = 2;
  string relation = 3;
}

// Response containing external graph data.
message BmsAutosarExternalGraph {
  repeated BmsAutosarExternalNode nodes = 1;
  repeated BmsAutosarExternalEdge edges = 2;
}

// Request to auto-fix a BMS AUTOSAR generated file using the configured LLM.
message AutoFixBmsAutosarFileRequest {
  Metadata metadata = 1;
  string file_path = 2; // Relative or absolute path to the file to fix
  bool apply = 3; // When true, write the fixed content to disk; otherwise return a preview
}

// Response from auto-fixing a BMS AUTOSAR generated file.
message AutoFixBmsAutosarFileResponse {
  bool fixed = 1; // Whether the LLM produced a different fix
  bool applied = 2; // Whether the fix was written to disk
  string file_path = 3; // Normalized relative path of the fixed file
  string original_content = 4; // Original file content
  string fixed_content = 5; // Fixed file content
  string diff = 6; // Unified diff between original and fixed content
  string message = 7; // Human-readable status message
  repeated BmsAutosarQualityIssue remaining_issues = 8; // Quality issues still present after the fix
}

// Request to auto-fix multiple BMS AUTOSAR generated files using the configured LLM.
message AutoFixBmsAutosarFilesRequest {
  Metadata metadata = 1;
  repeated string file_paths = 2; // Relative or absolute paths to the files to fix
  bool apply = 3; // When true, write all fixed contents to disk; otherwise return previews
}

// Response from auto-fixing multiple BMS AUTOSAR generated files.
message AutoFixBmsAutosarFilesResponse {
  repeated AutoFixBmsAutosarFileResponse results = 1; // Per-file results
  int32 fixed_count = 2; // Number of files with changes
  int32 applied_count = 3; // Number of files written to disk
  int32 total_count = 4; // Total number of files processed
  string message = 5; // Human-readable summary message
}

// Request to list BMS AUTOSAR generation templates.
message ListBmsAutosarTemplatesRequest {
  Metadata metadata = 1;
  string scope = 2; // "workspace" or "global"; empty returns merged view
}

// A single template entry in the list response.
message BmsAutosarTemplateEntry {
  string key = 1;
  string component_type = 2;
  bool is_builtin = 3; // true when the template comes from packaged assets
  string scope = 4; // "builtin", "global", or "workspace"
}

// Response from listing BMS AUTOSAR templates.
message BmsAutosarTemplatesList {
  repeated BmsAutosarTemplateEntry entries = 1;
}

// Request to save a user-defined BMS AUTOSAR generation template.
message SaveBmsAutosarTemplateRequest {
  Metadata metadata = 1;
  string scope = 2; // "workspace" or "global"
  string key = 3; // Unique template key
  string component_type = 4;
  string header_template = 5;
  string c_template = 6;
  string arxml_template = 7;
}

// Request to delete a user-defined BMS AUTOSAR generation template.
message DeleteBmsAutosarTemplateRequest {
  Metadata metadata = 1;
  string scope = 2; // "workspace" or "global"
  string key = 3;
}
